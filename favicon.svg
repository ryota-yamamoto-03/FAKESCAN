<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f18"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <clipPath id="rr">
      <rect width="32" height="32" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Left half tint (red) -->
  <rect x="0" y="0" width="16" height="32" fill="#f43f5e" opacity="0.08" clip-path="url(#rr)"/>
  <!-- Right half tint (green) -->
  <rect x="16" y="0" width="16" height="32" fill="#10d876" opacity="0.08" clip-path="url(#rr)"/>

  <!-- Divider -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- F (left, red) -->
  <text x="8" y="22" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="15"
        fill="#f43f5e" letter-spacing="-0.5">F</text>

  <!-- R (right, green) -->
  <text x="24" y="22" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="15"
        fill="#10d876" letter-spacing="-0.5">R</text>
</svg>
